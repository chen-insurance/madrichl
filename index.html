  <body>
    <div id="root">
      <!-- Critical shell matching actual React layout to minimize CLS -->
      <style>
        :root{--hdr-h:64px}
        @media(min-width:768px){:root{--hdr-h:80px}}
        html{scrollbar-gutter:stable}
        .sh-hdr{height:var(--hdr-h);background:hsl(0 0% 100%/.95);backdrop-filter:blur(12px);border-bottom:1px solid hsl(220 15% 90%);display:flex;align-items:center;justify-content:space-between;padding:0 24px;direction:rtl;position:sticky;top:0;z-index:50}
        .sh-logo{display:flex;align-items:center;gap:12px}
        .sh-logo-i{width:40px;height:40px;border-radius:8px;background:hsl(220 20% 92%)}
        @media(min-width:768px){.sh-logo-i{width:48px;height:48px}}
        .sh-logo-t{font-weight:700;font-size:18px;font-family:Heebo,Arial,sans-serif;color:hsl(220 30% 15%)}
        @media(min-width:768px){.sh-logo-t{font-size:20px}}
        .sh-nav{display:flex;gap:8px}
        .sh-nav b{width:56px;height:12px;background:hsl(220 15% 90%);border-radius:4px;display:inline-block}
        @media(max-width:1023px){.sh-nav{display:none}}
        .sh-hero{padding:32px 24px;max-width:1200px;margin:0 auto;direction:rtl}
        .sh-hero-g{display:grid;grid-template-columns:2fr 1fr;gap:24px}
        @media(max-width:1023px){.sh-hero-g{grid-template-columns:1fr}}
        .sh-main{aspect-ratio:16/9;background:hsl(220 15% 92%);border-radius:16px;position:relative;overflow:hidden}
        .sh-side{display:flex;flex-direction:column;gap:16px}
        @media(max-width:1023px){.sh-side{display:none}}
        .sh-sc{flex:1;background:hsl(0 0% 100%);border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center}
        .sh-sc-i{width:96px;height:96px;flex-shrink:0;background:hsl(220 15% 92%);border-radius:8px}
        .sh-sc-t{flex:1}.sh-sc-t div{height:12px;background:hsl(220 15% 92%);border-radius:4px;margin-bottom:8px}.sh-sc-t div:last-child{width:60%}
        .sh-cta{flex:1;background:hsl(220 40% 20%);border-radius:12px;min-height:80px}
        @keyframes shp{0%,100%{opacity:1}50%{opacity:.5}}
        .sh-main,.sh-logo-i,.sh-nav b,.sh-sc-i,.sh-sc-t div{animation:shp 1.5s ease-in-out infinite}
      </style>
      <div class="sh-hdr">
        <div class="sh-logo"><div class="sh-logo-i"></div><span class="sh-logo-t">המדריך לצרכן</span></div>
        <div class="sh-nav"><b></b><b></b><b></b></div>
      </div>
      <div class="sh-hero">
        <div class="sh-hero-g">
          <div class="sh-main"></div>
          <div class="sh-side">
            <div class="sh-sc"><div class="sh-sc-i"></div><div class="sh-sc-t"><div></div><div></div></div></div>
            <div class="sh-sc"><div class="sh-sc-i"></div><div class="sh-sc-t"><div></div><div></div></div></div>
            <div class="sh-cta"></div>
          </div>
        </div>
      </div>
    </div>
